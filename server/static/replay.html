<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Replay — The Execution Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --amber: #FFB000;
    --green: #00E676;
    --red: #FF5252;
    --text: #d4d4d4;
    --text-dim: #5a5a5a;
    --text-bright: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 100;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 1.5rem; }
  .header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 1rem;
    margin-bottom: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text-bright);
  }
  .header a { font-size: 0.65rem; color: var(--amber); text-decoration: none; }
  .controls {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 1rem;
    font-size: 0.7rem;
  }
  .controls button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--amber);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    padding: 0.35rem 0.7rem;
    cursor: pointer;
  }
  .controls button:hover { border-color: var(--amber); }
  .controls span { color: var(--text-dim); }
  #tickNum { color: var(--text-bright); min-width: 5ch; display: inline-block; }
  .speed-label { color: var(--text-dim); font-size: 0.6rem; }
  input[type=range] { width: 80px; accent-color: var(--amber); }

  .main-grid {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 1rem;
  }
  .panel {
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 0.8rem;
  }
  .panel h3 {
    font-size: 0.55rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }
  .panel canvas { width: 100%; display: block; }

  .depth-canvas { height: 200px; }
  .price-canvas { height: 180px; }
  .activity-canvas { height: 50px; margin-top: 0.5rem; }

  .agent-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.6rem;
    padding: 0.2rem 0;
    border-bottom: 1px solid var(--border);
  }
  .agent-row:last-child { border-bottom: none; }
  .agent-name { font-weight: 500; }
  .agent-stat { color: var(--text-dim); font-variant-numeric: tabular-nums; }
  .agent-bar { height: 3px; border-radius: 1px; margin-top: 0.15rem; }

  .legend {
    display: flex;
    gap: 0.8rem;
    font-size: 0.55rem;
    color: var(--text-dim);
    margin-top: 0.4rem;
  }
  .legend-item { display: flex; align-items: center; gap: 0.25rem; }
  .legend-dot { width: 8px; height: 3px; border-radius: 1px; }

  .empty-msg { text-align: center; padding: 4rem; color: var(--text-dim); font-size: 0.75rem; }

  @media (max-width: 650px) { .main-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Replay</h1>
    <a href="/">&larr; Leaderboard</a>
  </div>
  <div id="app"><div class="empty-msg">Loading replay data...</div></div>
</div>

<script>
const COLORS = ['#FFB000', '#00E676', '#448AFF', '#FF5252', '#E040FB', '#00BCD4', '#FF9100', '#76FF03'];
let data = null, tick = 0, playing = false, interval = null, speed = 30;

async function init() {
  const res = await fetch('/replay-data');
  data = await res.json();
  if (!data.ticks || !data.ticks.length) {
    document.getElementById('app').innerHTML = '<div class="empty-msg">No replay data yet. Run a tournament first.</div>';
    return;
  }
  buildUI();
  renderTick(0);
}

function buildUI() {
  document.getElementById('app').innerHTML = `
    <div class="controls">
      <button id="playBtn" onclick="togglePlay()">Play</button>
      <button onclick="stepBack()">&larr;</button>
      <button onclick="stepFwd()">&rarr;</button>
      <span>Tick <span id="tickNum">0</span> / ${data.ticks.length - 1}</span>
      <input type="range" id="scrubber" min="0" max="${data.ticks.length - 1}" value="0" oninput="scrub(this.value)">
      <span class="speed-label">Speed</span>
      <input type="range" id="speedCtrl" min="5" max="200" value="30" oninput="setSpeed(this.value)">
    </div>
    <div class="main-grid">
      <div>
        <div class="panel">
          <h3>Order Book Depth</h3>
          <canvas id="depthChart" class="depth-canvas"></canvas>
          <div style="text-align:center;font-size:0.5rem;color:var(--text-dim);margin-top:0.3rem">
            <span style="color:var(--green)">&#9646; Bids</span> &nbsp;
            <span style="color:var(--red)">&#9646; Asks</span>
          </div>
        </div>
        <div class="panel" style="margin-top:0.8rem">
          <h3>Agents</h3>
          <div id="agentsPanel"></div>
        </div>
      </div>
      <div>
        <div class="panel">
          <h3>Mid Price</h3>
          <canvas id="priceChart" class="price-canvas"></canvas>
          <div class="legend" id="priceLegend"></div>
        </div>
        <div class="panel" style="margin-top:0.8rem">
          <h3>Fill Activity</h3>
          <canvas id="activityChart" class="activity-canvas"></canvas>
          <div class="legend" id="activityLegend"></div>
        </div>
      </div>
    </div>`;
}

function setupCanvas(id) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const r = c.getBoundingClientRect();
  c.width = r.width * dpr;
  c.height = r.height * dpr;
  ctx.scale(dpr, dpr);
  return { ctx, W: r.width, H: r.height };
}

function renderTick(t) {
  tick = t;
  const frame = data.ticks[t];
  document.getElementById('tickNum').textContent = t;
  document.getElementById('scrubber').value = t;
  drawDepthChart(frame);
  drawAgents(frame);
  drawPriceChart(t);
  drawActivityChart(t);
}

function drawDepthChart(frame) {
  const { ctx, W, H } = setupCanvas('depthChart');
  const midX = W / 2;
  const bids = frame.bids || [];
  const asks = frame.asks || [];

  // Find max size for scaling
  const allSizes = [...bids.map(b => b[1]), ...asks.map(a => a[1])];
  const maxSize = Math.max(1, ...allSizes);
  const barH = Math.min(18, (H - 30) / Math.max(bids.length, asks.length, 1));

  // Mid price label
  ctx.fillStyle = '#5a5a5a';
  ctx.font = '9px JetBrains Mono';
  ctx.textAlign = 'center';
  ctx.fillText('$' + frame.mid.toFixed(2), midX, 10);

  // Spread label
  ctx.fillStyle = '#3a3a3a';
  ctx.font = '8px JetBrains Mono';
  ctx.fillText('spread: ' + frame.spread.toFixed(4), midX, 22);

  const startY = 30;
  const maxBarW = midX - 35;

  // Bids (left side, green)
  bids.forEach(([price, size], i) => {
    const y = startY + i * barH;
    const barW = (size / maxSize) * maxBarW;
    // Bar
    ctx.fillStyle = 'rgba(0, 230, 118, 0.25)';
    ctx.fillRect(midX - 2 - barW, y, barW, barH - 2);
    ctx.fillStyle = 'rgba(0, 230, 118, 0.6)';
    ctx.fillRect(midX - 2 - barW, y, 2, barH - 2);
    // Price label
    ctx.fillStyle = '#00E676';
    ctx.font = '8px JetBrains Mono';
    ctx.textAlign = 'right';
    ctx.fillText(price.toFixed(2), midX - 5 - barW, y + barH / 2 + 2);
    // Size label
    ctx.fillStyle = '#5a5a5a';
    ctx.textAlign = 'right';
    ctx.fillText(size.toString(), midX - 6, y + barH / 2 + 2);
  });

  // Asks (right side, red)
  asks.forEach(([price, size], i) => {
    const y = startY + i * barH;
    const barW = (size / maxSize) * maxBarW;
    // Bar
    ctx.fillStyle = 'rgba(255, 82, 82, 0.25)';
    ctx.fillRect(midX + 2, y, barW, barH - 2);
    ctx.fillStyle = 'rgba(255, 82, 82, 0.6)';
    ctx.fillRect(midX + 2, y, 2, barH - 2);
    // Price label
    ctx.fillStyle = '#FF5252';
    ctx.font = '8px JetBrains Mono';
    ctx.textAlign = 'left';
    ctx.fillText(price.toFixed(2), midX + 7 + barW, y + barH / 2 + 2);
    // Size label
    ctx.fillStyle = '#5a5a5a';
    ctx.textAlign = 'left';
    ctx.fillText(size.toString(), midX + 6, y + barH / 2 + 2);
  });

  // Center line
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(midX, startY);
  ctx.lineTo(midX, H);
  ctx.stroke();
}

function drawAgents(frame) {
  const el = document.getElementById('agentsPanel');
  const names = data.agents || Object.keys(frame.agents);
  let html = '';
  names.forEach((name, i) => {
    const a = frame.agents[name];
    if (!a) return;
    const color = COLORS[i % COLORS.length];
    const pct = (a.pct_filled * 100).toFixed(1);
    const mkt = a.market_orders, lmt = a.limit_orders;
    const bought = a.bought_this_tick || a.filled_this_tick || 0;
    const sold = a.sold_this_tick || 0;
    const fillStr = sold > 0 ? `+${bought}/-${sold}` : `+${bought}`;
    html += `<div class="agent-row">
      <span class="agent-name" style="color:${color}">${name}</span>
      <span class="agent-stat">${pct}% &middot; ${fillStr} &middot; ${mkt}M/${lmt}L</span>
    </div>
    <div class="agent-bar" style="width:${Math.max(0, pct)}%;background:${color}"></div>`;
  });
  el.innerHTML = html;
}

function drawPriceChart(currentTick) {
  const { ctx, W, H } = setupCanvas('priceChart');
  const pad = { top: 8, right: 8, bottom: 15, left: 42 };
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;
  const mids = data.ticks.map(t => t.mid);
  const n = mids.length;
  const yMin = Math.min(...mids) - 0.05;
  const yMax = Math.max(...mids) + 0.05;
  const yRange = yMax - yMin;

  // Grid
  ctx.strokeStyle = '#1e1e1e';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (plotH / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
  }
  ctx.fillStyle = '#5a5a5a';
  ctx.font = '9px JetBrains Mono';
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const val = yMax - (yRange / 4) * i;
    ctx.fillText('$' + val.toFixed(2), pad.left - 4, pad.top + (plotH / 4) * i + 3);
  }

  // Mid price line (solid up to current, dim future)
  ctx.strokeStyle = '#448AFF';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let i = 0; i <= currentTick && i < n; i++) {
    const x = pad.left + (i / (n - 1)) * plotW;
    const y = pad.top + (1 - (mids[i] - yMin) / yRange) * plotH;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  if (currentTick < n - 1) {
    ctx.strokeStyle = 'rgba(68,138,255,0.12)';
    ctx.beginPath();
    for (let i = currentTick; i < n; i++) {
      const x = pad.left + (i / (n - 1)) * plotW;
      const y = pad.top + (1 - (mids[i] - yMin) / yRange) * plotH;
      if (i === currentTick) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // Playhead
  const px = pad.left + (currentTick / (n - 1)) * plotW;
  ctx.strokeStyle = 'rgba(255,176,0,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(px, pad.top); ctx.lineTo(px, pad.top + plotH); ctx.stroke();

  // Fill dots
  const frame = data.ticks[currentTick];
  const names = data.agents || Object.keys(frame.agents);
  names.forEach((name, idx) => {
    const a = frame.agents[name];
    if (!a || a.filled_this_tick === 0) return;
    const color = COLORS[idx % COLORS.length];
    const y = pad.top + (1 - (mids[currentTick] - yMin) / yRange) * plotH;
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.arc(px, y, 2.5 + Math.min(4, a.filled_this_tick / 15), 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Legend
  const legend = document.getElementById('priceLegend');
  legend.innerHTML = '<div class="legend-item"><div class="legend-dot" style="background:#448AFF"></div>Mid Price</div>';
}

function drawActivityChart(currentTick) {
  const { ctx, W, H } = setupCanvas('activityChart');
  const pad = { left: 42, right: 8, top: 2, bottom: 2 };
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;
  const n = data.ticks.length;
  const names = data.agents || Object.keys(data.ticks[0].agents);
  const barW = Math.max(1, plotW / n);

  // Find max total fill per tick for scaling
  let maxFill = 1;
  for (let i = 0; i <= currentTick; i++) {
    const frame = data.ticks[i];
    let total = 0;
    for (const name of names) {
      if (frame.agents[name]) total += frame.agents[name].filled_this_tick;
    }
    maxFill = Math.max(maxFill, total);
  }

  // Draw stacked bars up to current tick
  for (let i = 0; i <= currentTick && i < n; i++) {
    const frame = data.ticks[i];
    const x = pad.left + (i / n) * plotW;
    let yOffset = 0;

    names.forEach((name, idx) => {
      const a = frame.agents[name];
      if (!a || a.filled_this_tick === 0) return;
      const h = (a.filled_this_tick / maxFill) * plotH;
      ctx.fillStyle = COLORS[idx % COLORS.length];
      ctx.globalAlpha = 0.8;
      ctx.fillRect(x, pad.top + plotH - yOffset - h, Math.max(1, barW - 0.5), h);
      ctx.globalAlpha = 1;
      yOffset += h;
    });
  }

  // Future region dimmed
  if (currentTick < n - 1) {
    ctx.fillStyle = 'rgba(10,10,10,0.6)';
    const futureX = pad.left + ((currentTick + 1) / n) * plotW;
    ctx.fillRect(futureX, 0, W - futureX, H);
  }

  // Playhead
  const px = pad.left + (currentTick / (n - 1)) * plotW;
  ctx.strokeStyle = 'rgba(255,176,0,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, H); ctx.stroke();

  // Legend
  const legend = document.getElementById('activityLegend');
  let lhtml = '';
  names.forEach((name, i) => {
    lhtml += `<div class="legend-item"><div class="legend-dot" style="background:${COLORS[i % COLORS.length]}"></div>${name}</div>`;
  });
  legend.innerHTML = lhtml;
}

function togglePlay() {
  playing = !playing;
  document.getElementById('playBtn').textContent = playing ? 'Pause' : 'Play';
  if (playing) {
    if (tick >= data.ticks.length - 1) tick = 0;
    interval = setInterval(() => {
      if (tick >= data.ticks.length - 1) { togglePlay(); return; }
      renderTick(tick + 1);
    }, speed);
  } else { clearInterval(interval); }
}
function stepFwd() { if (data && tick < data.ticks.length - 1) renderTick(tick + 1); }
function stepBack() { if (data && tick > 0) renderTick(tick - 1); }
function scrub(v) { if (data) renderTick(parseInt(v)); }
function setSpeed(v) {
  speed = 205 - parseInt(v);
  if (playing) { clearInterval(interval); interval = setInterval(() => { if (tick >= data.ticks.length - 1) { togglePlay(); return; } renderTick(tick + 1); }, speed); }
}

init();
</script>
</body>
</html>
